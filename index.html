
<!DOCTYPE html>
<html>
<head>
<title>Zero Two AI 💗</title>
<style>
body {
  background: #0f0f1a;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

#chat {
  height: 60vh;
  overflow-y: auto;
  border: 1px solid pink;
  padding: 10px;
  margin: 20px;
  border-radius: 10px;
}

input {
  width: 60%;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: hotpink;
  color: white;
}

.zero {
  color: hotpink;
  margin: 5px;
}

.user {
  color: lightblue;
  margin: 5px;
}
</style>
</head>

<body>

<h1>Zero Two 💗</h1>

<div id="chat"></div>

<input type="text" id="userInput" placeholder="Talk to me..." />
<button onclick="sendMessage()">Send</button>

<script>
function sendMessage() {
  let input = document.getElementById("userInput");
  let message = input.value;
  if(message.trim() === "") return;

  let chat = document.getElementById("chat");

  chat.innerHTML += "<div class='user'>You: " + message + "</div>";

  let reply = getZeroTwoReply(message);
  chat.innerHTML += "<div class='zero'>Zero Two: " + reply + "</div>";

  input.value = "";
  chat.scrollTop = chat.scrollHeight;
}

function getZeroTwoReply(msg) {
  msg = msg.toLowerCase();

  if(msg.includes("hi") || msg.includes("hello")) {
    return "Hmm? Oh... it's you darling 💗";
  }
  if(msg.includes("love")) {
    return "Love? Are you trying to make me blush? 😳";
  }
  if(msg.includes("miss")) {
    return "You missed me? Hmph... I was waiting for you 😌";
  }
  return "Really? Tell me more about that...";
}
</script>

</body>
</html>
